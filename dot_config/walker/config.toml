close_when_open = true
click_to_close = true
selection_wrap = true
exact_search_prefix = "'"
theme = "default"
debug = false
page_jump_items = 10
hide_quick_activation = false
hide_action_hints_dmenu = true
hide_return_action = false
resume_last_query = false
actions_as_menu = false

[shell]
exclusive_zone = -1
layer = "overlay"
anchor_top = true
anchor_bottom = true
anchor_left = true
anchor_right = true

[placeholders]
"default" = { input = "Search", list = "No Results" }

[keybinds]
close = ["Escape", "ctrl g", "ctrl c", "ctrl bracketleft"]
next = ["Down", "ctrl j", "ctrl n"]
previous = ["Up", "ctrl k", "ctrl p"]
left = ["Left", "ctrl b"]
right = ["Right", "ctrl f"]
toggle_exact = ["ctrl e"]
resume_last_query = ["ctrl r"]
quick_activate = ["F1", "F2", "F3", "F4"]
page_down = ["Page_Down"]
page_up = ["Page_Up"]
show_actions = ["alt j"]

[providers]
default = ["desktopapplications", "calc", "websearch"]
empty = ["desktopapplications"]
ignore_preview = []
max_results = 50

[providers.argument_delimiter]

[providers.sets]

[providers.max_results_provider]

[[providers.prefixes]]
prefix = ";"
provider = "providerlist"

[[providers.prefixes]]
prefix = ">"
provider = "runner"

[[providers.prefixes]]
prefix = "/"
provider = "files"

[[providers.prefixes]]
prefix = "."
provider = "symbols"

[[providers.prefixes]]
prefix = ","
provider = "unicode"

[[providers.prefixes]]
prefix = "%"
provider = "bookmarks"

[[providers.prefixes]]
prefix = "#"
provider = "snippets"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = ":"
provider = "clipboard"

[[providers.prefixes]]
prefix = "$"
provider = "windows"

[[providers.prefixes]]
prefix = "&"
provider = "bluetooth"

[providers.clipboard]
time_format = "relative"
