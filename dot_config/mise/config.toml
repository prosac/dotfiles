# Global mise config — tasks available from any cwd.
# Managed by chezmoi: edit the live file, then `mise run ch:readd`.

# Namespacing:
#   ch:*   chezmoi workflows
#   dots:* dotfile change-review / snapshot tooling (coming)

[tasks."ch:status"]
description = "Show chezmoi drift (source vs target)"
run = "chezmoi status"

[tasks."ch:diff"]
description = "Show pending chezmoi changes"
run = "chezmoi diff"

[tasks."ch:apply"]
description = "Apply source state to target"
run = "chezmoi apply"

[tasks."ch:readd"]
description = "Capture target edits into source (use after editing live configs)"
run = "chezmoi re-add"

[tasks."ch:managed"]
description = "List files managed by chezmoi"
run = "chezmoi managed"

[tasks."ch:unmanaged"]
description = "List files in target home that are NOT managed by chezmoi"
run = "chezmoi unmanaged --path-style=absolute"

[tasks."ch:cd"]
description = "Print the chezmoi source path"
run = "chezmoi source-path"

[tasks."ch:git"]
description = 'Run git in the chezmoi source repo (mise run ch:git -- status)'
run = 'chezmoi git -- {{arg(name="args", var=true)}}'

[tasks."ch:sync"]
description = "Pull source repo and apply"
run = "chezmoi git -- pull --rebase && chezmoi apply"

[tasks."ch:commit"]
description = "Stage all source changes and commit (mise run ch:commit -- 'commit msg')"
run = 'chezmoi git -- add -A && chezmoi git -- commit -m {{arg(name="msg")}}'

[tasks."ch:push"]
description = "Stage all source changes, commit, and push (mise run ch:push -- 'commit msg')"
run = 'chezmoi git -- add -A && chezmoi git -- commit -m {{arg(name="msg")}} && chezmoi git -- push'

[tasks."ch:scan"]
description = "Scan the chezmoi source repo for secrets (gitleaks)"
run = 'gitleaks git --verbose --redact "$(chezmoi source-path)"'

[tasks."ch:hooks"]
description = "Install pre-commit hooks into the chezmoi source repo"
run = '(cd "$(chezmoi source-path)" && pre-commit install)'

# --- dotfile snapshot review ---

[tasks."dots:snap"]
description = "Create a btrfs snapshot of /home now (manual)"
run = "dotsnap"

[tasks."dots:snaps"]
description = "List dotfile snapshots, oldest first"
run = "ls -1 /home/.snapshots/hourly/ | sort"

[tasks."dots:latest"]
description = "Print path to the most recent snapshot"
run = "ls -1 /home/.snapshots/hourly/ | sort | tail -1 | sed 's|^|/home/.snapshots/hourly/|'"

[tasks."dots:review"]
description = "Show dotfile drift since latest snapshot (optional: snapshot name)"
run = "dotreview"

# --- one-time per-machine setup ---

[tasks."bootstrap:sudoers"]
description = "Install /etc/sudoers.d/dotsnap (renders the template, asks for sudo)"
run = '''
set -e
src="$(chezmoi source-path)/bootstrap/sudoers/dotsnap.tmpl"
rendered="$(mktemp)"
chezmoi execute-template < "$src" > "$rendered"
sudo install -m 440 -o root -g root "$rendered" /etc/sudoers.d/dotsnap
sudo visudo -cf /etc/sudoers.d/dotsnap
rm -f "$rendered"
echo "Installed: /etc/sudoers.d/dotsnap"
'''

[tasks."bootstrap:dms-session"]
description = "Install the 'Hyprland (DMS)' wayland session entry (sudo install + disable dms.service in default Hyprland)"
run = '''
set -e
src="$(chezmoi source-path)/bootstrap/wayland-sessions/hyprland-dms.desktop.tmpl"
rendered="$(mktemp --suffix=.desktop)"
chezmoi execute-template < "$src" > "$rendered"
sudo install -m 644 -o root -g root "$rendered" /usr/share/wayland-sessions/hyprland-dms.desktop
rm -f "$rendered"
# Persistently disable dms in the default session — the wrapper runtime-enables
# it for the DMS session only.
systemctl --user disable dms.service 2>/dev/null || true
echo "Installed: /usr/share/wayland-sessions/hyprland-dms.desktop"
echo "dms.service is now disabled in the default Hyprland session."
echo "Log out and pick 'Hyprland (DMS)' at GDM to try it."
'''
