# Noti — Doom One palette
[general]
font = "JetBrains Mono"
width = 420
anchor = "top-right"
offset = [24, 24]   # 12px from right edge, 34px from top (clears waybar)
gap = 6

[display]
timeout = 6000
theme = "default"

[display.padding]
vertical = 14
horizontal = 18

[display.border]
size = 2
radius = 8

[display.summary]
font_size = 22

[display.body]
font_size = 20

[[theme]]
name = "default"

[theme.low]
foreground = "#bbc2cf"
background = "#282c34"
border = "#3f444a"
summary = "#bbc2cf"

[theme.normal]
foreground = "#bbc2cf"
background = "#282c34"
border = "#51afef"
summary = "#51afef"

[theme.critical]
foreground = "#bbc2cf"
background = "#282c34"
border = "#ff6c6b"
summary = "#ff6c6b"
