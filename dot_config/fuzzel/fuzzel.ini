# Fuzzel — minimal launcher matched to the workstation palette

font=JetBrains Mono:size=12
dpi-aware=yes
prompt=">_ "
icon-theme=Adwaita
icons-enabled=yes
fields=name,generic,comment,categories
terminal=kitty
layer=overlay
width=40
lines=12
horizontal-pad=16
vertical-pad=10
inner-pad=6

[colors]
# Match waybar / hyprland borders
# Charcoal bg, muted grey text, steel-blue selection
background=14161af2
text=c0c4ccff
match=6b7a99ff
selection=6b7a99ff
selection-text=14161aff
selection-match=5c9090ff
border=5c9090a0
prompt=5c9090ff
placeholder=6a6e78ff
input=c0c4ccff

[border]
radius=0
width=1

[key-bindings]
# Vim + Emacs navigation: hjkl pair and n/p pair, plus defaults
# default delete-line-forward=Control+k must be freed first
delete-line-forward=none
prev=Up Control+k Control+p
next=Down Control+j Control+n
prev-with-wrap=ISO_Left_Tab
next-with-wrap=Tab
prev-page=Page_Up
next-page=Page_Down
first=Control+Home
last=Control+End

# Editing
cursor-left=Left Control+b
cursor-right=Right Control+f
cursor-home=Home Control+a
cursor-end=End Control+e
delete-prev=BackSpace
delete-prev-word=Control+BackSpace Control+w
delete-next=Delete
delete-next-word=Control+Delete

# Execution
execute=Return KP_Enter
execute-or-next=Control+m
cancel=Escape Control+g Control+c Control+bracketleft
