# niri counterpart of hypridle.conf. Same timeouts and brightness behaviour;
# the only difference is the display-power commands: Hyprland's `hyprctl dispatch
# dpms` has no effect under niri, so we drive DPMS through `niri msg action
# power-off-monitors` / `power-on-monitors`. Loaded by hypridle-niri.service.
#
# hyprlock is compositor-agnostic (ext-session-lock), so the lock path is shared.

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = niri msg action power-on-monitors; systemctl --user restart waybar
}

listener {
    timeout = 300                           # 5 min: dim display
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

listener {
    timeout = 600                           # 10 min: lock
    on-timeout = loginctl lock-session
}

listener {
    timeout = 630                           # 10.5 min: monitors off (30s after lock)
    on-timeout = niri msg action power-off-monitors
    on-resume = niri msg action power-on-monitors
}
