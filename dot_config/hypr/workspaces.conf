# Window → workspace routing rules.
# silent: open on target workspace without switching focus.
# See workspace labels in setup_workspaces.sh.

# 1:Web — browser (everything-web window: gmail, chat, prefect, etc.)
windowrulev2 = workspace 1 silent, class:^(chromium-browser)$
windowrulev2 = workspace 1 silent, class:^(Chromium-browser)$
windowrulev2 = workspace 1 silent, class:^(google-chrome)$
windowrulev2 = workspace 1 silent, class:^(Google-chrome)$
windowrulev2 = workspace 1 silent, class:^(firefox)$

# 2:Code — emacs (org-mode notes live here too)
windowrulev2 = workspace 2 silent, class:^(emacs)$
