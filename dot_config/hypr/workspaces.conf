# Window → workspace routing rules
# silent: open on target workspace without switching focus

# 1: Comms
windowrulev2 = workspace 1 silent, class:^(Slack)$
windowrulev2 = workspace 1 silent, class:^(discord)$
windowrulev2 = workspace 1 silent, class:^(org\.thunderbird\.Thunderbird)$
windowrulev2 = workspace 1 silent, class:^(thunderbird)$

# 3: Browser
windowrulev2 = workspace 3 silent, class:^(chromium-browser)$
windowrulev2 = workspace 3 silent, class:^(google-chrome)$
windowrulev2 = workspace 3 silent, class:^(firefox)$

# 4: Editing
windowrulev2 = workspace 4 silent, class:^(emacs)$

