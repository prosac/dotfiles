# Baseline packages this dotfile setup assumes.
# Consumed by run_onchange_after_install-packages.sh.tmpl, which picks the
# right slice based on the host's Fedora version (templates can branch; data
# files cannot, since chezmoi loads .chezmoidata before the template engine).
#
# Two Fedora paths:
#   F43+ : walker/elephant come from the `errornointernet/walker` COPR.
#   F42  : that COPR has no F42 chroot. The install script rebuilds walker +
#          elephant SRPMs locally and needs the Rust/GTK4 + Go build toolchain.

elephantProviders:
  - desktopapplications
  - providerlist
  - calc
  - clipboard
  - files
  - runner
  - websearch
  - symbols
  - unicode
  - menus
  - bookmarks
  - snippets
  - bluetooth
  - windows

packages:
  # COPRs enabled on every Fedora.
  copr:
    - solopasha/hyprland
    - tofik/nwg-shell

  # COPRs enabled only on Fedora 43+ (no F42 chroot).
  coprF43Plus:
    - errornointernet/walker

  # dnf packages installed on every Fedora.
  dnf:
    # Core
    - git
    - zsh
    - vim
    - fzf
    - ripgrep
    - btrfs-progs
    - flatpak

    # chezmoi pipeline
    - gitleaks
    - pre-commit

    # Hyprland WM (solopasha/hyprland)
    - hyprland
    - hyprpaper
    - hypridle
    - hyprlock
    - waybar

    # niri WM — scrollable-tiling alternative session (Fedora repo, no COPR).
    # Ships niri-session + /usr/share/wayland-sessions/niri.desktop, so "Niri"
    # appears at GDM automatically. xwayland-satellite (pulled in as a dep)
    # provides XWayland. hyprlock/hypridle/waybar/swww/etc. are shared with the
    # Hyprland session — see dot_config/niri/ and the systemd user services.
    - niri

    # Display tools (tofik/nwg-shell)
    - nwg-displays

    # System integration / tray / auth
    - blueman
    - mate-polkit
    - network-manager-applet
    - pavucontrol

    # Elephant runtime recommends (used by selected providers)
    - bluez
    - fd-find
    - libnotify
    - qalculate-gtk
    - wl-clipboard

  # Mail stack — installed only when `mailSetup = true` in chezmoi.toml.
  # The install-packages script gates this slice; .chezmoidata can't branch
  # on chezmoi data itself, so the conditional lives in the consumer.
  #
  # lieer pulls in `notmuch2` from PyPI, whose sdist is broken on Fedora
  # (missing version.txt at build time). Fedora ships a working binding as
  # python3-notmuch2; the run_onchange_after_post-install-lieer.sh.tmpl hook
  # creates a uv venv with --system-site-packages so lieer can import it.
  # gmime30 (gmime 3.x runtime) is pulled in by notmuch automatically.
  # jq is used by ~/.local/bin/mail-sync to detect refresh-token rotation.
  dnfMail:
    - notmuch
    - python3-notmuch2
    - w3m
    - jq

  # Fedora 43+ only — installed straight from the walker COPR.
  # elephant-<provider> packages are added by the install script from
  # `elephantProviders` above.
  dnfF43Plus:
    - walker
    - elephant

  # Fedora 42 only — SRPM rebuild toolchain (the rebuild itself runs in
  # run_onchange_after_install-packages.sh.tmpl).
  dnfF42:
    # Rebuild infrastructure
    - rpm-build
    - rpmdevtools
    # Walker (Rust, GTK4)
    - cargo
    - cargo-rpm-macros
    - rust
    - rustfmt
    - protobuf-compiler
    - gtk4-devel
    - gtk4-layer-shell-devel
    - cairo-gobject-devel
    - pango-devel
    - poppler-glib-devel
    - gdk-pixbuf2-devel
    - graphene-devel
    - glib2-devel
    # Elephant (Go)
    - golang
    - go-rpm-macros
    - kando
    - wayland-devel
