# Baseline packages this dotfile setup assumes.
# Consumed by run_onchange_after_install-packages.sh.tmpl.
# Edit and run `chezmoi apply` — the script reruns when this file changes.

packages:
  copr:
    - solopasha/hyprland
    - tofik/nwg-shell
    # NOTE: errornointernet/walker is the upstream of the SRPMs the install
    # script fetches and rebuilds locally — not enabled here because it has no
    # F42 chroot (would 404 on `dnf install`). Re-enable when on F43+.

  dnf:
    # Core
    - git
    - zsh
    - vim
    - fzf
    - ripgrep
    - btrfs-progs
    - flatpak

    # chezmoi pipeline
    - gitleaks
    - pre-commit

    # Hyprland WM (solopasha/hyprland)
    - hyprland
    - hyprpaper
    - hypridle
    - hyprlock
    - waybar
    - kando

    # Display tools (tofik/nwg-shell)
    - nwg-displays

    # System integration / tray / auth
    - blueman
    - mate-polkit
    - network-manager-applet
    - pavucontrol

    # Walker + Elephant — SRPM rebuild toolchain (F42 fallback path).
    # Once on F43+ these can shrink to direct `walker elephant elephant-<provider>` install.
    - rpm-build
    - rpmdevtools
    # Walker (Rust, GTK4)
    - cargo
    - cargo-rpm-macros
    - rust
    - rustfmt
    - protobuf-compiler
    - gtk4-devel
    - gtk4-layer-shell-devel
    - cairo-gobject-devel
    - pango-devel
    - poppler-glib-devel
    - gdk-pixbuf2-devel
    - graphene-devel
    - glib2-devel
    # Elephant (Go)
    - golang
    - go-rpm-macros
    - wayland-devel
    # Elephant runtime recommends (used by selected providers)
    - bluez
    - fd-find
    - libnotify
    - qalculate-gtk
    - wl-clipboard
